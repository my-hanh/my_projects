<!DOCTYPE html>
<html>

<head>
  <title>W3.CSS Template</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    html,
    body,
    h1,
    h2,
    h3,
    h4,
    h5 {
      font-family: "Raleway", sans-serif
    }
    /* Small responsive grid for charts */
    #charts {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 900px) {
      #charts {
        grid-template-columns: 1fr 1fr;
      }
    }

    .chart {
      background: #fff;
      padding: 8px;
      border: 1px solid #e6e6e6;
      border-radius: 4px;
      min-height: 240px;
      box-sizing: border-box;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
  </style>
</head>

<body>

  <!-- !PAGE CONTENT! -->
  <div class="main" style="margin-left:300px;margin-top:43px;">

      <!-- Header -->
      <header class="container" style="padding-top:22px">
        <h5><b><img src="mental-health.png" style="width:5%;height:5%;">  How many people suffer from mental illness?</b></h5>
      </header>

      <!-- Chart container (d3 will append SVGs here) -->
      <div class="container" style="padding:16px">
        <div id="container" style="max-width:1200px">
          <!-- Controls: dataset select + redraw button -->
          <div class="controls" style="background:transparent;padding:0 4px">
            <label for="dataset-select">Dataset:</label>
            <select id="dataset-select">
              <option value="sample1">Worldwide WHO</option>
              <option value="sample2">Switzerland (sample)</option>
            </select>

            <span id="status" style="margin-left:8px;color:#666;font-size:0.9em"></span>
          </div>

          <!-- Charts grid: two responsive panels. d3_chart.js can append into #chart1 and #chart2 -->
          <div id="charts">
            <div id="chart1" class="chart" aria-label="Chart 1"></div>
            <div id="chart2" class="chart" aria-label="Chart 2"></div>
          </div>
        </div>
      </div>

      <!-- End page content -->
  </div>

  <!-- Load controls helper and the external module that draws the charts -->
  <!-- Load D3 (UMD build) so d3 is available as a global for browsers that block module CDN imports -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="./controls.js" defer></script>
  <!-- Visual error handler: shows runtime errors on the page to aid debugging -->
  <script>
    (function(){
      function showError(message) {
        try {
          const status = document.getElementById('status');
          if (status) status.textContent = 'Error: ' + message;
          const chart1 = document.getElementById('chart1') || document.getElementById('container');
          if (chart1) {
            chart1.innerHTML = '';
            const pre = document.createElement('pre');
            pre.style.whiteSpace = 'pre-wrap';
            pre.style.color = '#a00';
            pre.style.fontSize = '12px';
            pre.textContent = message;
            chart1.appendChild(pre);
          }
        } catch (e) {
          // ignore
        }
      }

      window.addEventListener('error', function (ev) {
        showError((ev && ev.message) ? ev.message : String(ev));
      });

      window.addEventListener('unhandledrejection', function (ev) {
        const reason = ev && ev.reason ? (ev.reason.message || String(ev.reason)) : String(ev);
        showError('Unhandled promise rejection: ' + reason);
      });
    })();
  </script>
  <script src="./d3_chart.js"></script>
  <!-- Diagnostic: check that D3 loaded as a global and inform the user if not -->
  <script>
    (function(){
      setTimeout(() => {
        const status = document.getElementById('status');
        const chart1 = document.getElementById('chart1') || document.getElementById('container');
        if (typeof window.d3 === 'undefined') {
          const msg = 'D3 library not found. Check network or CDN blocking; open DevTools console for details.';
          console.warn(msg);
          if (status) status.textContent = 'Error: D3 not loaded';
          if (chart1) {
            chart1.innerHTML = '';
            const p = document.createElement('p');
            p.style.color = '#a00';
            p.style.fontSize = '13px';
            p.textContent = msg;
            chart1.appendChild(p);
          }
        } else {
          if (status) status.textContent = '';
          console.log('[main.html] d3 is present, version', window.d3 && window.d3.version);
        }
      }, 400);
    })();
  </script>

</body>

</html>
